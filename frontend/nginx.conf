server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: mọi route không khớp file → trả index.html
    # (cần cho React Router, vd reload tại /marketing/posts)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache asset tĩnh
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
